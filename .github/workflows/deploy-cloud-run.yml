name: Deploy Cloud Run Gemini

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag. Defaults to the commit SHA."
        required: false
        type: string
      service_name:
        description: "Cloud Run service name."
        required: false
        default: "gemini-api"
        type: string
      environment:
        description: "GitHub environment used for vars/secrets."
        required: false
        default: "production"
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      VERTEX_LOCATION: ${{ vars.VERTEX_LOCATION }}
      ARTIFACT_REGISTRY_REPOSITORY_ID: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY_ID }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_PREFIX: ${{ vars.TF_STATE_PREFIX }}
      IMAGE_NAME: gemini-api
      GEMINI_DEFAULT_MODEL: gemini-2.5-flash-lite
      GEMINI_MODELS: "gemini-3.5-flash,gemini-2.5-flash,gemini-3.1-flash,gemini-2.5-flash-lite,gemini-3-pro,gemini-2.5-pro,gemini-3.1-pro,gemini-3-flash"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: image
        shell: bash
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_TERRAFORM_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Write Terraform backend config
        working-directory: terraform-cloud-run-only
        shell: bash
        run: |
          cat > backend.hcl <<EOF
          bucket = "${TF_STATE_BUCKET}"
          prefix = "${TF_STATE_PREFIX}"
          EOF

      - name: Terraform init
        working-directory: terraform-cloud-run-only
        run: terraform init -backend-config=backend.hcl

      - name: Terraform validate
        working-directory: terraform-cloud-run-only
        run: terraform validate

      - name: Ensure Artifact Registry repository
        shell: bash
        run: |
          if gcloud artifacts repositories describe "${ARTIFACT_REGISTRY_REPOSITORY_ID}" \
            --project="${PROJECT_ID}" \
            --location="${REGION}" >/dev/null 2>&1; then
            echo "Artifact Registry repository already exists: ${ARTIFACT_REGISTRY_REPOSITORY_ID}"
          else
            gcloud artifacts repositories create "${ARTIFACT_REGISTRY_REPOSITORY_ID}" \
              --project="${PROJECT_ID}" \
              --location="${REGION}" \
              --repository-format=docker \
              --description="Repository Docker pour Cloud Run Gemini"
          fi

      - name: Configure Docker for Artifact Registry
        shell: bash
        run: |
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build image
        shell: bash
        run: |
          docker build \
            -t "${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY_ID}/${IMAGE_NAME}:${{ steps.image.outputs.tag }}" \
            ./app

      - name: Push image
        shell: bash
        run: |
          docker push "${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY_ID}/${IMAGE_NAME}:${{ steps.image.outputs.tag }}"

      - name: Terraform apply
        working-directory: terraform-cloud-run-only
        run: |
          terraform apply -auto-approve \
            -var="project_id=${PROJECT_ID}" \
            -var="region=${REGION}" \
            -var="vertex_location=${VERTEX_LOCATION}" \
            -var="service_name=${{ inputs.service_name }}" \
            -var="image_name=${IMAGE_NAME}" \
            -var="image_tag=${{ steps.image.outputs.tag }}" \
            -var="artifact_registry_repository_id=${ARTIFACT_REGISTRY_REPOSITORY_ID}" \
            -var="gemini_default_model=${GEMINI_DEFAULT_MODEL}" \
            -var="gemini_models=[\"gemini-3.5-flash\",\"gemini-2.5-flash\",\"gemini-3.1-flash\",\"gemini-2.5-flash-lite\",\"gemini-3-pro\",\"gemini-2.5-pro\",\"gemini-3.1-pro\",\"gemini-3-flash\"]"
