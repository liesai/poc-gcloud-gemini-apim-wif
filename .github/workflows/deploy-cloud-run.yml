name: Deploy Cloud Run Gemini

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag. Defaults to the commit SHA."
        required: false
        type: string
      service_name:
        description: "Cloud Run service name."
        required: false
        default: "gemini-api"
        type: string
      environment:
        description: "GitHub environment used for vars/secrets."
        required: false
        default: "production"
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      VERTEX_LOCATION: ${{ vars.VERTEX_LOCATION }}
      ARTIFACTORY_REGISTRY_URL: ${{ vars.ARTIFACTORY_REGISTRY_URL }}
      CLOUD_RUN_SERVICE_ACCOUNT_EMAIL: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT_EMAIL }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_PREFIX: ${{ vars.TF_STATE_PREFIX }}
      IMAGE_NAME: gemini-api
      GEMINI_DEFAULT_MODEL: gemini-2.5-flash-lite
      GEMINI_MODELS: "gemini-3.5-flash,gemini-2.5-flash,gemini-3.1-flash,gemini-2.5-flash-lite,gemini-3-pro,gemini-2.5-pro,gemini-3.1-pro,gemini-3-flash"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: image
        shell: bash
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve Artifactory login server
        id: artifactory
        shell: bash
        run: |
          registry="${ARTIFACTORY_REGISTRY_URL#http://}"
          registry="${registry#https://}"
          echo "login_server=${registry%%/*}" >> "$GITHUB_OUTPUT"
          echo "image_prefix=${registry}" >> "$GITHUB_OUTPUT"

      - name: Login to Artifactory
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.artifactory.outputs.login_server }}
          username: ${{ secrets.ARTIFACTORY_USERNAME }}
          password: ${{ secrets.ARTIFACTORY_PASSWORD }}

      - name: Build image
        shell: bash
        run: |
          docker build \
            -t "${{ steps.artifactory.outputs.image_prefix }}/${IMAGE_NAME}:${{ steps.image.outputs.tag }}" \
            ./app

      - name: Push image
        shell: bash
        run: |
          docker push "${{ steps.artifactory.outputs.image_prefix }}/${IMAGE_NAME}:${{ steps.image.outputs.tag }}"

      - name: Write Terraform backend config
        working-directory: terraform-cloud-run-only
        shell: bash
        run: |
          cat > backend.hcl <<EOF
          bucket = "${TF_STATE_BUCKET}"
          prefix = "${TF_STATE_PREFIX}"
          EOF

      - name: Terraform init
        working-directory: terraform-cloud-run-only
        run: terraform init -backend-config=backend.hcl

      - name: Terraform validate
        working-directory: terraform-cloud-run-only
        run: terraform validate

      - name: Terraform apply
        working-directory: terraform-cloud-run-only
        run: |
          terraform apply -auto-approve \
            -var="project_id=${PROJECT_ID}" \
            -var="region=${REGION}" \
            -var="vertex_location=${VERTEX_LOCATION}" \
            -var="service_name=${{ inputs.service_name }}" \
            -var="service_account_email=${CLOUD_RUN_SERVICE_ACCOUNT_EMAIL}" \
            -var="artifactory_registry_url=${{ steps.artifactory.outputs.image_prefix }}" \
            -var="image_name=${IMAGE_NAME}" \
            -var="image_tag=${{ steps.image.outputs.tag }}" \
            -var="gemini_default_model=${GEMINI_DEFAULT_MODEL}" \
            -var="gemini_models=[\"gemini-3.5-flash\",\"gemini-2.5-flash\",\"gemini-3.1-flash\",\"gemini-2.5-flash-lite\",\"gemini-3-pro\",\"gemini-2.5-pro\",\"gemini-3.1-pro\",\"gemini-3-flash\"]"
